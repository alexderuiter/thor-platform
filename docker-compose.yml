version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thor
      POSTGRES_PASSWORD: thor_dev_2026
      POSTGRES_DB: thor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
